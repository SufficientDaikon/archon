# Archon Root Manifest
# This file registers all skills, bundles, agents, pipelines, and the Virtuoso engine.

name: archon
version: 1.0.0
description: "Archon — The Virtuoso Engine for AI Agents. Universal skills framework with enforced guardrails, cognitive synapses, and pipeline orchestration."
author: tahaa
license: MIT
repository: https://github.com/SufficientDaikon/archon

# Virtuoso Engine — the cognitive kernel
virtuoso:
  version: 1.0.0
  path: virtuoso/virtuoso.xml
  model_floor: opus-4.6
  description: "The cognitive kernel that enforces reasoning quality through 5 synapses, the Virtuoso execution loop, and model-aware scaffolding."

