<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)" />
  <!-- Inner glow -->
  <rect x="12" y="12" width="104" height="104" rx="18" ry="18" fill="url(#glow)" opacity="0.3" />
  <!-- Lightning bolt (zap) -->
  <path d="M72 16 L48 60 L62 60 L56 112 L80 68 L66 68 Z"
        fill="#FFFFFF" stroke="none" opacity="0.95" />
  <!-- Small circle accents -->
  <circle cx="28" cy="28" r="4" fill="#FFFFFF" opacity="0.4" />
  <circle cx="100" cy="100" r="4" fill="#FFFFFF" opacity="0.4" />
  <circle cx="100" cy="28" r="3" fill="#FFFFFF" opacity="0.3" />
  <circle cx="28" cy="100" r="3" fill="#FFFFFF" opacity="0.3" />
</svg>
