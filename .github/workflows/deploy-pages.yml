# Deploy Archon documentation to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          # Copy documentation
          cp -r docs _site/docs
          # Copy archon-for-kids to root for easy access
          cp docs/archon-for-kids.html _site/
          cp docs/{skills,agents,synapses,pipelines}.html _site/
          # Copy llms.txt files
          cp llms.txt _site/ || true
          # Add .nojekyll to prevent Jekyll processing
          touch _site/.nojekyll
          # Create landing page redirecting to docs
          cat > _site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <title>Archon Documentation</title>
          <meta http-equiv="refresh" content="0; url=docs/getting-started.html" />
          <link rel="canonical" href="docs/getting-started.html" />
          </head>
          <body>
          <p>Redirecting to <a href="docs/getting-started.html">Archon Documentation</a>...</p>
          </body>
          </html>
          LANDING

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
