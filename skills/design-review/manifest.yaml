name: design-review
version: 1.0.0
description: "Design critique and review methodology with heuristic evaluation, consistency checking, accessibility compliance, and visual quality assessment."
author: tahaa
license: MIT
tags: ["design", "ui-ux", "spec-driven-development", "architecture"]
triggers:
  keywords: ["review", "critique", "heuristic", "accessibility", "audit"]
  patterns: []
priority: P2

output-schema:
  review_report:
    type: string
    description: "Structured design review report in markdown"
    required: true
  violations:
    type: list
    description: "List of design violations found (severity, rule, location)"
    required: true
  score:
    type: integer
    description: "Design quality score 0-100"
    required: false
