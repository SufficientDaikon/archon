name: context-curator
version: 1.0.0
description: "Context curation for multi-agent pipeline handoffs with summarization, filtering, chunking, state management, handoff validation, and budget tracking."
author: tahaa
license: MIT
tags:
  [
    "context-management",
    "pipeline-orchestration",
    "handoff-validation",
    "multi-agent",
    "spec-driven-development",
  ]
triggers:
  keywords:
    [
      "curate context",
      "context brief",
      "pipeline handoff",
      "resume pipeline",
      "refresh context",
      "pipeline dashboard",
      "validate handoff",
      "context budget",
    ]
  patterns: ["*handoff*", "*pipeline state*", "*context brief*"]
priority: P1

output-schema:
  context_brief:
    type: object
    description: "Curated context package ready for pipeline handoff"
    required: true
  token_budget_used:
    type: integer
    description: "Tokens consumed by the curated context"
    required: false
  sections_included:
    type: list
    description: "List of section names included in the context brief"
    required: false
